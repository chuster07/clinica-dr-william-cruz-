version: '3.8'

services:
  # N8N - Orquestador de automatizaciones
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_clinica
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_CORS_ALLOW_ORIGINS=${N8N_CORS_ALLOW_ORIGINS:-*}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Costa_Rica}
      - TZ=${TZ:-America/Costa_Rica}
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}
      - N8N_LOG_OUTPUT=${N8N_LOG_OUTPUT:-console}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows
    networks:
      - clinica_network

  # Evolution API - WhatsApp Business (GRATIS)
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api_clinica
    restart: unless-stopped
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    environment:
      # Configuración básica
      - SERVER_URL=${SERVER_URL:-http://localhost:8080}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}

      # Base de datos (SQLite - no requiere PostgreSQL)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=sqlite
      - DATABASE_CONNECTION_URI=file:./evolution.db

      # Configuración de instancias
      - CONFIG_SESSION_PHONE_CLIENT=${CONFIG_SESSION_PHONE_CLIENT:-Clinica Dr William Cruz}
      - CONFIG_SESSION_PHONE_NAME=${CONFIG_SESSION_PHONE_NAME:-Chrome}

      # Webhooks para N8N
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${EVOLUTION_WEBHOOK_GLOBAL_URL:-http://n8n:5678/webhook/whatsapp}
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=true

      # Logs
      - LOG_LEVEL=${EVOLUTION_LOG_LEVEL:-INFO}
      - LOG_COLOR=${EVOLUTION_LOG_COLOR:-true}

      # QR Code
      - QRCODE_LIMIT=${QRCODE_LIMIT:-30}
      - QRCODE_COLOR=${QRCODE_COLOR:-#198754}
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - clinica_network

  # Redis (Opcional - para caché)
  redis:
    image: redis:alpine
    container_name: redis_clinica
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - clinica_network

volumes:
  n8n_data:
  evolution_instances:
  evolution_store:
  redis_data:

networks:
  clinica_network:
    driver: bridge
